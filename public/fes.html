    main{max-width:1200px;margin:auto;padding:18px 14px 60px}
    .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.04)}

    .sub{color:var(--muted);font-size:13px}
    .note{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:10px}

    .note-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a}
    .note-err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
    .btn{border:0;border-radius:8px;padding:9px 15px;font-weight:700;cursor:pointer;font-size:13px}
    .btn-primary{background:var(--blue);color:#fff}
    .btn-secondary{background:#fff;color:#374151;border:1px solid var(--line)}
    .btn-danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .btn-success{background:#047857;color:#fff}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .row-sb{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
    .progress{height:8px;background:#e5e7eb;border-radius:99px;overflow:hidden;margin:8px 0}
    .bar{height:100%;background:linear-gradient(90deg,#1d4ed8,#047857);transition:.3s}
    input,select,textarea{padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:13px;font-family:inherit}
    input:focus,select:focus{outline:2px solid #93c5fd;outline-offset:1px}
    .fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
    .fg label{font-size:12px;font-weight:700;color:#374151}
    .fg input,.fg select,.fg textarea{width:100%}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:640px){.two-col{grid-template-columns:1fr}}
    .qblock{background:#fff;border-left:4px solid var(--blue);padding:10px 14px;border-radius:8px;margin:14px 0 8px;font-weight:700}
    .qgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
    @media(max-width:860px){.qgrid{grid-template-columns:1fr}}
    .q{border:1px solid var(--line);border-radius:9px;padding:11px;background:#fff}
    .q.done{border-color:#34d399;background:#f0fdf4}
    .q.miss{border-color:#f87171;background:#fef2f2}
    .qtop{display:flex;justify-content:space-between;margin-bottom:7px}
    .qn{background:#eef4ff;color:#1e40af;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:800}
    .qs{background:#f1f5f9;color:#475569;border-radius:99px;padding:2px 8px;font-size:11px;font-weight:700}
    .qt{font-size:13px;color:#1f2937;line-height:1.5;margin-bottom:9px}
    .opts{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .opt{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 10px;cursor:pointer;font-size:12px;font-weight:600;text-align:left;line-height:1.3}
    .opt:hover{border-color:#60a5fa;background:#eff6ff}
    .opt.sel{background:var(--blue);border-color:var(--blue);color:#fff}
    table{width:100%;border-collapse:collapse}
    th,td{border-bottom:1px solid var(--line);padding:9px 11px;font-size:13px;text-align:left}
    th{background:#f8fafc;font-size:12px;font-weight:700;color:#374151}
    .sc{font-size:24px;font-weight:900;color:var(--blue)}
    .lbadge{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700}
    .lb-low{background:#fee2e2;color:#991b1b}

    @media print{nav,.noprint{display:none!important}body{background:#fff}}

</head>

function parseRange(s) {
  if (!s || s === '-') return [];
  if (s.indexOf('-') > -1) {
    var parts = s.split('-');
    var lo = parseInt(parts[0]);
    var hi = parseInt(parts[1]);
    var arr = [];
    for (var i = lo; i <= hi; i++) arr.push(i);
    return arr;
  }
  return [parseInt(s)];
}

function buildLookup(rowObj) {
  var lkp = {};
  for (var st = 1; st <= 10; st++) {
    var vals = parseRange(rowObj[String(st)]);
    for (var j = 0; j < vals.length; j++) {
      if (!(vals[j] in lkp)) lkp[vals[j]] = st;
    }
  }
  return lkp;
}

// Build fast lookup tables once
var LOOKUP = {};
var grpKeys = ['children','parents'];
for (var gi = 0; gi < grpKeys.length; gi++) {
  var grp = grpKeys[gi];
  LOOKUP[grp] = {};
  var dims = Object.keys(NORMS_RAW[grp].rows);
  for (var di = 0; di < dims.length; di++) {
    var dim = dims[di];
    LOOKUP[grp][dim] = buildLookup(NORMS_RAW[grp].rows[dim]);
  }
}

// ============================================================
// HELPERS
// ============================================================
function qSub(q) {
  var subs = Object.keys(KEY);
  for (var i = 0; i < subs.length; i++) {
    var items = KEY[subs[i]];
    for (var j = 0; j < items.length; j++) {
      if (items[j].q === q) return subs[i];
    }
  }
  return '';
}

function getSten(grp, dim, raw) {
  if (!grp || !LOOKUP[grp] || !LOOKUP[grp][dim]) return null;
  var v = LOOKUP[grp][dim][raw];
  return (v !== undefined) ? v : null;
}

function nullOrDash(v) {
  return (v !== null && v !== undefined) ? String(v) : '&#8212;';
}

function getLvl(s) {
  if (s === null || s === undefined) return {l:'Not mapped', cls:'lb-null', bg:'#f1f5f9', col:'#64748b'};
  if (s <= 3) return {l:'Low',     cls:'lb-low',  bg:'#fee2e2', col:'#b91c1c'};
  if (s <= 7) return {l:'Average', cls:'lb-avg',  bg:'#dcfce7', col:'#047857'};
  return           {l:'High',    cls:'lb-high', bg:'#ede9fe', col:'#7c3aed'};
}

// VI interpretation — exact from Indian Manual Table-2 Interpretation of Vi Score
// STEN 10     = No Distortion: little or no distortion, responses quite consistent
// STEN 5–9   = Low Distortion: scores fairly accurate, retesting not required
// STEN 1–4   = High Distortion: scores not reliable, retesting desirable
function getViInterp(s) {
  if (s === null || s === undefined) return {txt:'Not mapped &mdash; norm table entry absent', cls:'lb-null'};
  if (s === 10)              return {txt:'No Distortion &mdash; There is little or no distortion. Responses are quite consistent.', cls:'lb-high'};
  if (s >= 5 && s <= 9)     return {txt:'Low Distortion &mdash; Scores are fairly accurate and retesting is not required.', cls:'lb-avg'};
  if (s >= 1 && s <= 4)     return {txt:'High Distortion &mdash; Scores are not reliable. It is desirable for the individual to take the test again after some time.', cls:'lb-low'};
  return {txt:'Not mapped', cls:'lb-null'};
}

function calc() {
  var det = {};
  var allDone = true;
  for (var q = 1; q <= 98; q++) { if (!R[q]) allDone = false; }

  var subNames = Object.keys(KEY);
  for (var si = 0; si < subNames.length; si++) {
    var s = subNames[si];
    var items = KEY[s];
    var raw = 0;
    var rows = [];
    for (var ii = 0; ii < items.length; ii++) {
      var it = items[ii];
      var a = R[it.q];
      var v = a ? it[a] : null;
      if (v === 1) raw++;
      rows.push({q:it.q, a:it.a, b:it.b, ans:a||'', val:v});
    }
    det[s] = {raw:raw, sten:getSten(AG,s,raw), rows:rows};
  }

  var viRaw = 0;
  var segs = [];
  for (var vi = 0; vi < VI_SEGS.length; vi++) {
    var pairs = VI_SEGS[vi];
    var sc = 0;
    var pi = [];
    for (var pi2 = 0; pi2 < pairs.length; pi2++) {
      var q1 = pairs[pi2][0];
      var q2 = pairs[pi2][1];
      var r1 = R[q1]; var r2 = R[q2];
      var m = (r1 && r2 && r1 === r2) ? 1 : 0;
      sc += m;
      pi.push({q1:q1, q2:q2, r1:r1||'', r2:r2||'', m:m});
    }
    viRaw += sc;
    segs.push({s:vi+1, sc:sc, pi:pi});
  }
  return {allDone:allDone, det:det, vi:{raw:viRaw, sten:getSten(AG,'Vi',viRaw), segs:segs}};
}

  var tabs = document.querySelectorAll('.tab');

  }
  var fns = {resp:rRESP, assess:rASSESS, results:rRESULTS, matrix:rMATRIX, vi:rVI, norms:rNORMS};
  if (fns[tab]) fns[tab]();
}

function ageHint() {
  var el = document.getElementById('fa');
  if (!el) return;
  var age = parseInt(el.value || '');
  var h = document.getElementById('ahint');
  var sel = document.getElementById('fag');
  if (!h || !sel) return;
  if (age >= 12 && age <= 20) {
    h.style.color = '#047857'; h.textContent = 'Children range -- Table 5 will be used'; sel.value = 'children';
  } else if (age >= 33 && age <= 58) {
    h.style.color = '#047857'; h.textContent = 'Parents range -- Table 4 will be used'; sel.value = 'parents';
  } else if (age > 0) {
    h.style.color = '#b45309'; h.textContent = 'Outside norm ranges (12-20 or 33-58). Select manually.';
  } else {
    h.textContent = '';
  }
}

function saveResp() {
  var nm = document.getElementById('fn').value.trim();

  var dt = document.getElementById('fd').value;
  var gr = document.getElementById('fag').value;
  var nt = document.getElementById('fnotes').value.trim();

    html += '<div class="qblock">Page ' + pg + ' &mdash; Q' + qs + '&ndash;Q' + qe + '</div><div class="qgrid">';
    for (var q = qs; q <= qe; q++) {
      var sub = qSub(q);
      var sel = R[q] || '';
      var qd  = Q[q];
      html += '<div class="q ' + (sel ? 'done' : '') + '" id="qi' + q + '">' +
        '<div class="qtop"><span class="qn">Q' + q + '</span><span class="qs">' + sub + '</span></div>' +
        '<div class="qt">' + qd.t + '</div>' +
        '<div class="opts">' +

        '<button class="opt ' + (sel==='b'?'sel':'') + '" onclick="ans(' + q + ',\'b\')"><b style="color:' + (sel==='b'?'#fff':'#1d4ed8') + '">b)</b> ' + qd.b + '</button>' +
        '</div></div>';

function ans(q, a) {
  R[q] = a; save();
  var el = document.getElementById('qi' + q);
  if (el) {
    el.className = 'q done';
    var opts = el.querySelectorAll('.opt');
    for (var i = 0; i < opts.length; i++) {
      var isSel = (i === (a === 'a' ? 0 : 1));
      if (isSel) { opts[i].classList.add('sel'); opts[i].querySelector('b').style.color = '#fff'; }
      else       { opts[i].classList.remove('sel'); opts[i].querySelector('b').style.color = '#1d4ed8'; }
    }
  }
  var n = 0; var rk = Object.keys(R); for (var i=0;i<rk.length;i++) { if(R[rk[i]]) n++; }
  var pb = document.getElementById('pbar'); if (pb) pb.style.width = Math.round(n/98*100) + '%';
  var pc = document.getElementById('pcnt'); if (pc) pc.innerHTML = '<b>'+n+'/98</b> answered &middot; '+Math.round(n/98*100)+'%';
}
